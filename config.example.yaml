# Eksempelkonfig for XZKJ-makropad (12 taster + 4 knotter)
# Flash med: .venv/bin/python macroctl.py flash config.example.yaml

layer: 1

# 4 rader x 3 kolonner, slik tastaturet ligger foran deg (rad 1 = øverst)
keys:
  - ["cmd+c",       "cmd+v",       "cmd+x"]
  - ["cmd+z",       "cmd+shift+z", "cmd+a"]
  - ["cmd+tab",     "media:play",  "cmd+w"]
  - ["cmd+shift+4", "f13",         "f14"]

# Knotter 1-4: left = vri mot klokka, press = trykk, right = vri med klokka
knobs:
  1: {left: "media:volumedown", press: "media:mute", right: "media:volumeup"}
  2: {left: "media:prev",       press: "media:play", right: "media:next"}
  3: {left: "cmd+minus",        press: "cmd+0",      right: "cmd+shift+equal"}
  4: {left: "up",               press: "enter",      right: "down"}
